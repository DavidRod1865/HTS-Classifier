# =============================================================================
# Netlify deployment config for the frontend
# =============================================================================
# Build command runs from the frontend/ directory.
# Output goes to dist/ (Vite's default).
# SPA redirect sends all routes to index.html for client-side routing.
# =============================================================================

[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# SPA redirect — all routes serve index.html, React Router handles the rest
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache hashed assets aggressively (Vite adds content hashes to filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"