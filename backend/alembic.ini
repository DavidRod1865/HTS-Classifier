# =============================================================================
# Alembic configuration
# =============================================================================
# Alembic is our database migration tool. Think of it like git for your
# database schema — each migration is a "commit" that changes the tables.
#
# Run migrations:  alembic upgrade head      (apply all pending migrations)
# Create new:      alembic revision --autogenerate -m "description"
# Check status:    alembic current           (which migration are we on?)
# =============================================================================

[alembic]
# Where migration files live
script_location = alembic

# The database URL is set in env.py (reads from our app config),
# not hardcoded here. This placeholder is required by Alembic but unused.
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s